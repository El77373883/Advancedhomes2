name: Build AdvancedHomes

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Java 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Maven
      run: mvn clean package -q

    - name: Upload JAR
      uses: actions/upload-artifact@v3
      with:
        name: AdvancedHomes
        path: target/AdvancedHomes.jar
